<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="=UTF-8">
    <meta name="viewport" content="width=device-width", initial-scale="1.0">
    <title>Styled Input Field</title>
    <link rel="stylesheet" href="style.css">   
<style>
    .styled-input {
        width: 300px;
        padding: 8px 12px;
        border: 1px solid #ccc;
        margin: 5px;
    }
    div {
        margin-bottom: 15px;
    }
</style>
</head>
<body>
    <div>
        <label for="styled-input"><Label Text</label>
        <input type="text" id="styled-input" class="styled-input">  
    </div>
</body>    
</html>
