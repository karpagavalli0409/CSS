<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Dashboard Snippet</title>
    <style>
        table { width: 100%; border-collapse: collapse;}
        th, td  { border: 1px solid #ddd; padding: 8px; text-align: left; }
        caption { font-weight: bold; margin-bottom: 10px; }
        figure { margin: 20px 0; }
        img { max-width: 100%; height: auto; }
    </style>
</head>
<body>
    <h1>Data Dashboard</h1>
    <section>
        <h2>Key Metrics</h2>
        <figure>
            <img src="placeholder1.jpg" alt="Metric Chart 2">
            <figcaption>Profit Margin Analysis</figcaption>
        </figure>
    </section>
    <section>
        <h2>Recent Transactions</h2>
        <table>
            <caption>Overview of Latest Financial Transactions</caption>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Description</th>
                    <th>Amount</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>2026.01.10</td>
                    <td>Product Sale</td>
                    <td>12,500</td>
                </tr>
                <tr>
                    <td>2026.01.11</td>
                    <td>Service Fee</td>
                    <td>3,200</td>
                </tr>
                <tr>
                    <td>2026.01.12</td>
                    <td>Refund</td>
                    <td>-800</td>
                </tr>
                <tr>
                    <td colspan="2">Total Transactions</td>
                    <td>14,900</td>
                </tr>
            </tbody>
        </table>
    </section>
</body>
</html>
