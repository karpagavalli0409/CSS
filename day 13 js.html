<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 13 Practice</title>
</head> 
<body>
    <h1>JavaScript Loop Practice</h1>
    <script>
        for (let i=1; i<=5; i++) {
            console.log(i);
        }
        for (let i = 10; i>=0; i--) {
            console.log(i);
        }
        const fruits= ["Apple", "Banana", "Cherry"];
        for (let i =0; i <fruits.length; i++) {
            console.log(fruits[i]);
        }     
        let countdown= 5;
        while (countdown > 0) {
            console.log(countdown);
            countdown--;
        }
        console.log("Avoid infinite loops by ensuring the condition updates properly.");
        let condition= 10;
        do {
            console.log(condition);
            condition++;
        }while (condition < 10);
        fruits.forEach((fruit, index) => {
            console.log(`Index ${index}: ${fruit}`);
        });
        for (let i = 1; i <=10; i++) {
            if(i === 7) break;
            console.log(i);
        }
        for (let i = 1; i <= 10; i++) {
            if (i === 5) continue;
            console.log(i);
        }
        for (let i = 1; i <=20; i++) {
            if (i % 2 === 0) {
                console.log(`${i} is even`);
            }
        }                         
    </script>
</body>   
</html>
