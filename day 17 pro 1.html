<!DOCTYPE html>
<html lANG="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Dynamic Image Gallery</title>
    <style>
        .border-highlight {
            border: 5px solid gold;
        }        
    </style>
</head>
<body>
    <div id="gallery">
        <img class="gallery-item" src="DSC_0771.jpg">
        <img class="gallery-item" src="DSC_0771.jpg">
        <img class="gallery-item" src="DSC_0771.jpg">
    </div>
    <script>
        const images = document.queryselectorAll('.gallery-item');

        for (let i=0; i<images.length; i++) {
            if (i===0) {
                images[i].classlist.add('border-highlight');
            }
            if (i===1) {
                images[i].setAttribute('alt', 'Description of the second image');
            }
        }
            </script>
</body>
</html>
