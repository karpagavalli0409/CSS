<!DOCTYPE html>
<html lANG="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
</head>
<body>
    <h1>Dynamic Image Gallery</h1>
    <div id="gallery">
        <img src="flower.jfif" class="gallery-item">
        <img src="flower1.jfif" class="gallery-item">
        <img src="flower2.jfif" class="gallery-item">
    </div>
    <style>
        .gallery-item {
            margin: 10px;
        }
        .border-highlight {
            border: 5px solid gold;
        }
    </style>
    <script>
        let images = document.querySelectorAll('.gallery-item');
        for (let i = 0; i < images.length; i++) {
            if (i === 0) {
        images[i].classList.add('border-highlight');
            }
            if (i === 1) {
                images[i].setAttribute('alt', 'This is the second image');
            }
        }
    </script>
</body>
</html>
