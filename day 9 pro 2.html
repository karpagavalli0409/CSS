<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Gallery</title>
</head> 
<body>
    <div class="gallery">
        <div class="featured">1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
    </div>
</body> 
<style>
.gallery {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr; 
    grid-template-rows: 1fr 1fr 1fr;
    gap: 10px;
}

.featured {
    grid-column: 1 / 3;
    grid-row: 1 / 3;
}

/* Optional styling to make the divs look like images */
.gallery div {
    background-color: green;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
}    
</style>  
</html>
