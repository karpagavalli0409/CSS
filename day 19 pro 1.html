<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>   
<body>
    <h1>Secure Password Validator</h1>
    <script>
        function isPasswordStrong(password) {
            const hasMinLength = password.length >=8;
            const hasUppercase = /[A-Z]/.test(password);
            const hasDigit = /\d/.test(password);
            return hasMinLength && hasUppercase && hasDigit;
        }
        const strongPassword = "StrongPass1";
        const weakPassword = "weakpass";
        console.log(`Strong password check: ${isPasswordStrong(strongPassword)}`);
        console.log(`Weak password check: ${isPasswordStrong(weakPassword)}`);
    </script>
</body> 
</html>
