<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Text Mirror</title>
</head> 
<body>
    <input type="text" id="source-input">
    <p id="output-mirror"></p>
    <script>
        const sourceInput = document.getElementById('source-input');
        const outputMirror = document.getElementById('output-mirror');
        sourceInput.addEventListener('keydown', (e) => {
            if (e.key === 'q') {
                e.preventDefault();
                console.log("Q is restricted.");
            }
        });
        sourceInput.addEventListener('keyup', (e) => {
            outputMirror.textContent = e.target.value;
        });
    </script>
</body>   
</html>
