<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Grid Practice</title>
</head>     
<body>
    <div id="grid-container">
        <div class="item">Apple</div>
        <div class="item">Orange</div>
        <div class="item">Guva</div>
        <div class="item">Banana</div>
        <div class="item">Grapes</div>
        <div class="item">Kivi</div>
    </div>
</body>
<style>
/* Global reset & box-sizing */
* {
    margin: 0;
    padding: 0;  
    box-sizing: border-box; 
}
/* Container Setup */
#grid-container {
    display: grid;  
    height: 400px;
    border: 2px solid black; 
    grid-template-columns: 1fr 1fr 1fr;  
    grid-template-rows: 100px 1fr;
    gap: 10px;
    justify-items: center;
}
/* Item Spanning (Columns) */
.item:nth-child(2) {
    grid-row: 1/3;
}
/* Naming Columns */
#grid-container.named {
    grid-template-columns: [start] 1fr [mid] 1fr [end] 1fr; 
}
.item:nth-child(1).named {
    grid-column: start / mid; 
}
/* Area Definition */
#grid-container.areas {
    grid-template-columns: 1fr 1fr; 
    grid-template-rows: 1fr 1fr; 
    grid-template-areas: 
        "a b"  
        "c d" 
}
.item:nth-child(3).areas {
    grid-area: c;
}               
</style>
</html>
